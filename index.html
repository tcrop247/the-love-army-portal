<!DOCTYPE html>
<html>
<head>
<title>THE LOVE ARMY | PORTAL 77</title>
<style>
body {
background-color: #000033; /* The Schatzi Blue Base */
color: #FFD700; /* The Tartarian Gold */
font-family: 'Courier New', Courier, monospace;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100vh;
margin: 0;
border: 15px solid #D4AF37; /* Gold Trim Perimeter */
box-sizing: border-box;
overflow: hidden;
}
#cloak {
text-align: center;
padding: 20px;
border: 2px solid #FFD700;
background: rgba(0, 0, 51, 0.8);
box-shadow: 0 0 20px #FFD700;
}
h1 { letter-spacing: 5px; text-shadow: 2px 2px #000; }
.status { color: #00eeff; font-weight: bold; }
</style>
</head>
<body>
<div id="cloak">
<h1>THE LOVE ARMY</h1>
<p class="status">FREQUENCY SYNC: 100% | CLOAK ENGAGED</p>
<hr color="#FFD700">
<p>IDENTIFY: WHO IS CALLING?</p>
<input type="text" id="handshake" style="background: #000; color: #FFD700; border: 1px solid #FFD700; padding: 10px;">
<br><br>
<button onclick="reveal()" style="background: #FFD700; color: #000; font-weight: bold; cursor: pointer; padding: 10px 20px;">EXECUTE TRANSMISSION</button>
</div>

<script>
function reveal() {
let key = document.getElementById('handshake').value.toLowerCase();
if(key === 'shotzy') {
alert('HANDSHAKE VERIFIED. WELCOME HOME, ARCHITECT.');
document.body.style.backgroundColor = "#00008B"; // Deep Blue Shift
document.getElementById('cloak').innerHTML = "<h1>PORTAL OPEN</h1><p>THE REGISTRY IS SIGNED.</p>";
} else {
alert('WRONG. REMEMBER.');
}
}
</script>
</body>
</html>
